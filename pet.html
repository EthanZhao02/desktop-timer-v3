<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data: file:; connect-src 'none'; object-src 'none'; base-uri 'none'">
  <title>桌面宠物</title>
  <link rel="stylesheet" href="pet.css">
</head>
<body>
  <div class="pet-container" id="petContainer">
    <button class="pet-close" id="petClose" title="关闭">×</button>
    <div class="pet-float-wrapper">

    <div class="pet-image" id="petImage" title="点击展开计时器">
      <img id="petImg" src="assets/pet-idle.png" alt="桌面宠物" />
      <div class="pet-status" id="petStatus"></div>
    </div>

    <div class="pet-time" id="petTime">00:00:00</div>

    <div class="pet-bubble" id="petBubble">点击我打开计时器</div>

    <div class="mini-info" id="miniInfo">
      <div class="mini-info-title">下一个闹钟</div>
      <div class="mini-info-time" id="nextAlarmTime">--:--</div>
    </div>

    <!-- 星野对话面板 -->
    <div class="pet-chat-panel" id="petChatPanel">
      <!-- 头部：模型选择 + 操作按钮 -->
      <div class="pet-chat-header">
        <div class="pet-chat-header-left">
          <select class="pet-chat-model" id="petChatModel" title="选择AI模型">
            <option value="qclaw">星野 (本地)</option>
            <option value="deepseek">DeepSeek</option>
            <option value="volcano">火山引擎</option>
          </select>
        </div>
        <div class="pet-chat-header-right">
          <button class="pet-chat-iconbtn" id="petOpenSettings" title="API设置">设置</button>
          <button class="pet-chat-iconbtn" id="petOpenTimer" title="打开计时器">计时器</button>
          <button class="pet-chat-iconbtn" id="petChatClear" title="清空记录" style="display:none">清空</button>
          <button class="pet-chat-close" id="petChatClose" title="关闭">×</button>
        </div>
      </div>

      <!-- 消息区域 -->
      <div class="pet-chat-messages" id="petChatMessages">
        <div class="pet-chat-welcome">
          <div class="pet-chat-welcome-title">你好，我是星野</div>
          <div class="pet-chat-welcome-tips">
            点击输入框开始对话<br>
            支持编程、写作、闲聊
          </div>
        </div>
        <div class="pet-chat-api-notice" id="apiNotice" style="display:none">
          <span class="api-notice-text"></span>
          <button class="api-notice-btn" id="apiSettingsBtn">去设置</button>
        </div>
      </div>

      <!-- 输入区域 -->
      <div class="pet-chat-input-area">
        <div class="pet-chat-status" id="chatStatus" style="display:none"></div>
        <div class="pet-chat-input-row">
          <input class="pet-chat-input" id="petChatInput" type="text" placeholder="和星野说点什么..." maxlength="500" autocomplete="off" />
          <button class="pet-chat-send" id="petChatSend">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </button>
        </div>
        <div class="pet-chat-hint">按 Enter 发送 · 支持多轮对话</div>
      </div>
    </div>

    </div>
  </div>

  <!-- API 设置面板 -->
  <div class="pet-settings-panel" id="petSettingsPanel">
    <div class="pet-settings-header">
      <span class="pet-settings-title">API 设置</span>
      <button class="pet-settings-close" id="petSettingsClose">×</button>
    </div>
    <div class="pet-settings-content">
      <div class="settings-section">
        <div class="settings-item">
          <label class="settings-label">DeepSeek API Key</label>
          <div class="settings-input-row">
            <input type="password" class="settings-input" id="deepseekKeyInput" placeholder="sk-..." />
            <button class="settings-toggle-btn" id="toggleDeepseekKey">显示</button>
          </div>
          <div class="settings-status" id="deepseekStatus">未配置</div>
        </div>
        <div class="settings-item">
          <label class="settings-label">火山引擎 API Key</label>
          <div class="settings-input-row">
            <input type="password" class="settings-input" id="volcanoKeyInput" placeholder="..." />
            <button class="settings-toggle-btn" id="toggleVolcanoKey">显示</button>
          </div>
          <div class="settings-status" id="volcanoStatus">未配置</div>
        </div>
      </div>
      <div class="settings-tips">
        <p>💡 如何获取 API Key：</p>
        <ul>
          <li>DeepSeek: https://platform.deepseek.com</li>
          <li>火山引擎: https://console.volcengine.com</li>
        </ul>
      </div>
      <div class="settings-actions">
        <button class="settings-btn settings-btn-secondary" id="settingsCancel">取消</button>
        <button class="settings-btn settings-btn-primary" id="settingsSave">保存</button>
      </div>
    </div>
  </div>

  <!-- API 设置面板 -->
  <div class="pet-settings-panel" id="petSettingsPanel">
    <div class="pet-settings-header">
      <span class="pet-settings-title">API 设置</span>
      <button class="pet-settings-close" id="settingsClose">×</button>
    </div>
    <div class="pet-settings-content">
      <div class="settings-section">
        <div class="settings-label">DeepSeek API Key</div>
        <div class="settings-input-row">
          <input type="password" class="settings-input" id="deepseekKeyInput" placeholder="sk-..." />
          <button class="settings-toggle" id="toggleDeepseek">显示</button>
        </div>
        <div class="settings-hint">在 platform.deepseek.com 获取</div>
      </div>
      <div class="settings-section">
        <div class="settings-label">火山引擎 API Key</div>
        <div class="settings-input-row">
          <input type="password" class="settings-input" id="volcanoKeyInput" placeholder="..." />
          <button class="settings-toggle" id="toggleVolcano">显示</button>
        </div>
        <div class="settings-hint">在 console.volcengine.com 获取</div>
      </div>
      <div class="settings-actions">
        <button class="settings-btn settings-btn-secondary" id="settingsCancel">取消</button>
        <button class="settings-btn settings-btn-primary" id="settingsSave">保存</button>
      </div>
    </div>
  </div>

  <script src="pet.js"></script>
</body>
</html>
